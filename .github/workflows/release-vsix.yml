name: Release VSIX

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Package VSIX
        run: npx -y @vscode/vsce package

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"
